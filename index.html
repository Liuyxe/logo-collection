<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo收集站</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🎨 Logo收集站</h1>
            <p class="subtitle">发现和分享精美的logo设计</p>
        </div>
    </header>

    <main class="container">
        <section class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索logo...">
                <button id="searchBtn">🔍</button>
            </div>
            
            <div class="filter-box">
                <select id="categoryFilter">
                    <option value="all">所有分类</option>
                    <option value="tech">科技</option>
                    <option value="food">餐饮</option>
                    <option value="fashion">时尚</option>
                    <option value="education">教育</option>
                    <option value="other">其他</option>
                </select>
            </div>

            <button id="uploadBtn" class="btn-primary">➕ 上传Logo</button>
        </section>

        <section id="logoGrid" class="logo-grid">
        </section>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📭</div>
            <h3>暂无Logo</h3>
            <p>点击上方"上传Logo"按钮添加你的第一个logo</p>
        </div>
    </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>上传新Logo</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="logoName">Logo名称</label>
                    <input type="text" id="logoName" required>
                </div>
                
                <div class="form-group">
                    <label for="logoCategory">分类</label>
                    <select id="logoCategory" required>
                        <option value="tech">科技</option>
                        <option value="food">餐饮</option>
                        <option value="fashion">时尚</option>
                        <option value="education">教育</option>
                        <option value="other">其他</option>
                        <option value="custom">➕ 添加新分类</option>
                    </select>
                    <input type="text" id="customCategory" placeholder="输入新分类名称" style="display: none; margin-top: 10px;">
                </div>
                
                <div class="form-group">
                    <label for="logoDescription">描述</label>
                    <textarea id="logoDescription" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="logoImage">Logo图片</label>
                    <input type="file" id="logoImage" accept="image/*" required>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                
                <button type="submit" class="btn-primary">上传</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content detail-content">
            <span class="close">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Logo收集站 - 由GitHub Pages托管</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
